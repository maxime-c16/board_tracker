postprocess:
  min_component_area: 400
  hole_fill_area: 250
  smoothing_kernel: 5
  opening_kernel: 3
  crop_pad: 80
  enable_board_rectification: true
  rectification_width_scale: 1.0
  rectification_prompt_margin_scale: 1.5
  rectification_min_elongation: 8.0
scoring:
  sam_score_weight: 0.35
  elongation_weight: 0.2
  width_consistency_weight: 0.12
  click_containment_weight: 0.12
  roi_consistency_weight: 0.08
  centerline_quality_weight: 0.13
  prompt_span_weight: 0.12
  blob_penalty_weight: 0.1
  branch_penalty_weight: 0.16
  endpoint_penalty_weight: 0.08
  min_click_distance_from_edge: 0.0
  target_elongation: 20.0
  target_centerline_ratio: 25.0
  target_endpoint_count: 2
  target_prompt_margin_thickness: 4.0
runtime:
  multimask_output: true
  save_all_candidates: true
  auto_roi_scale: 1.8
  debug: false
visualization:
  overlay_alpha: 0.45
  point_radius: 6
